<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{% block title %}braggraphs{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
  <script src="{{ url_for('static', filename='htmx.min.js') }}" defer></script>
</head>
<body class="min-h-screen bg-neutral-50 text-neutral-900 antialiased">
  {% block body %}
  <header class="border-b border-neutral-200 bg-white">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-3">
      <a href="{{ url_for('admin.dashboard') }}" class="text-sm font-semibold tracking-tight">braggraphs</a>
      <nav class="flex items-center gap-4 text-sm text-neutral-500">
        <a href="{{ url_for('admin.dashboard') }}" class="hover:text-neutral-900">dashboard</a>
        <a href="{{ url_for('admin.builder') }}" class="hover:text-neutral-900">embed builder</a>
        <a href="{{ url_for('admin.settings') }}" class="hover:text-neutral-900">settings</a>
        <form method="post" action="{{ url_for('admin.logout') }}">
          <button class="hover:text-neutral-900" type="submit">log out</button>
        </form>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-5xl px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  {% endblock %}
</body>
</html>
