{% extends "base.html" %}
{% block title %}log in · braggraphs{% endblock %}
{% block body %}
<main class="flex min-h-screen items-center justify-center bg-neutral-50">
  <form method="post" class="w-72 rounded-xl border border-neutral-200 bg-white p-6 shadow-sm">
    <h1 class="mb-4 text-sm font-semibold tracking-tight">braggraphs admin</h1>
    {% if error %}
    <p class="mb-3 rounded-md bg-red-50 px-3 py-2 text-xs text-red-700">{{ error }}</p>
    {% endif %}
    <input
      type="password" name="password" placeholder="password" autofocus required
      class="mb-3 w-full rounded-md border border-neutral-300 px-3 py-2 text-sm outline-none focus:border-indigo-500">
    <button type="submit"
      class="w-full rounded-md bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500">
      log in
    </button>
  </form>
</main>
{% endblock %}
