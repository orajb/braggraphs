<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{{ title }}</title>
  <style>
    html, body { margin: 0; padding: 0; background: {{ theme.bg }}; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      display: inline-block;
    }
    img { display: block; }
    .footer {
      font-size: 10px; color: {{ theme.muted }};
      text-align: right; padding: 2px 6px 4px 0;
    }
    .footer a { color: {{ theme.muted }}; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <img src="{{ graph_url }}" width="{{ w }}" height="{{ h }}" alt="{{ title }}">
  {% if powered_by %}
  <div class="footer">
    <a href="https://github.com/orajb/braggraphs" rel="noopener">powered by braggraphs</a>
  </div>
  {% endif %}
</body>
</html>
